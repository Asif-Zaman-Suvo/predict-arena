  <!-- Soccer ball pattern -->
  <g transform="translate(256, 256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="179.2" fill="none" stroke="white" stroke-width="15.36"/>

    <!-- Pentagon pattern (simplified) -->
    <path d="M0,-128 L122.88,-40.96 L76.8,102.4 L-76.8,102.4 L-122.88,-40.96 Z"
